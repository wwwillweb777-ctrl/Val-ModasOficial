<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Caixa Registradora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { 
            line-height: 1.6; 
            background-color: #000000 !important; 
            color: #ffffff !important; 
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 8px; }
        .shadow { box-shadow: 0 4px 6px -1px rgba(255,255,255,0.1), 0 2px 4px -1px rgba(255,255,255,0.06); }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(255,255,255,0.1), 0 4px 6px -2px rgba(255,255,255,0.05); }
        .rounded-xl { border-radius: 0.75rem; } .rounded-2xl { border-radius: 1rem; }
        .transition { transition: all 0.15s ease; }

        .bg-blue-50 { background-color: #1a1a1a !important; } 
        .bg-green-50 { background-color: #1a1a1a !important; } 
        .bg-purple-50 { background-color: #1a1a1a !important; }
        .bg-yellow-100 { background-color: #2b2b2b !important; } 
        .bg-green-100 { background-color: #1a1a1a !important; } 
        .bg-blue-100 { background-color: #1a1a1a !important; } 
        .bg-red-100 { background-color: #2b2b2b !important; }

        .text-yellow-800 { color: #FFD700 !important; } 
        .text-green-800 { color: #ffffff !important; } 
        .text-blue-800 { color: #ffffff !important; }
        .text-red-800 { color: #ffffff !important; }
        h1, h2, h3, h4, h5, h6 { color: #FFD700 !important; }
        p, span, div, label, input, select, textarea { color: #ffffff !important; }

        a { text-decoration: none; } nav a { transition: all 0.2s ease; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1a1a1a; } ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

        .btn-menu {
            border: none !important;
            border-radius: 10px !important;
            padding: 7px 12px !important;
            cursor: pointer !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            text-align: center !important;
            min-width: 78px !important;
            height: 36px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            margin: 0 2px !important;
            pointer-events: auto !important;
            opacity: 1 !important;
        }
        .btn-azul {
            background-color: #2563eb !important;
            color: #ffffff !important;
        }
        .btn-azul-claro {
            background-color: rgba(37, 99, 235, 0.25) !important;
            color: #ffffff !important;
        }

        .btn-sair {
            background-color: #dc2626 !important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 10px !important;
            padding: 4px 12px !important;
            font-size: 14px !important; 
            font-weight: bold !important;
            position: absolute !important;
            top: 4px !important;
            right: 12px !important;
            height: 28px !important;
            z-index: 10;
        }

        .titulo-atendente {
            color: #FFD700 !important;
            -webkit-text-stroke: 0.5px #000000;
            text-stroke: 0.5px #000000;
            text-shadow: 
                1px 1px 1px rgba(0, 0, 0, 0.4),
                -0.5px -0.5px 0.5px rgba(0, 0, 0, 0.4),
                0 0 3px #FFD700;
            display: inline-block;
            padding: 2px 8px;
        }

        .btn-acao {
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 4px;
            transition: all 0.2s ease;
        }
        .btn-entregue { background-color: #16a34a; color: white; }
        .btn-entregue:hover { background-color: #15803d; }
        .btn-cancelar { background-color: #dc2626; color: white; }
        .btn-cancelar:hover { background-color: #b91c1c; }
        .btn-editar { background-color: #eab308; color: black; }
        .btn-editar:hover { background-color: #ca8a04; }

        .btn-remover {
            background: transparent !important;
            border: none !important;
            font-size: 16px !important;
            cursor: pointer !important;
            color: inherit !important;
            padding: 2px !important;
        }
        .btn-remover:hover {
            color: #ef4444 !important;
        }

        .item-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 16px !important;
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin: 10px 0;
            border: 1px solid #333;
        }
        .item-container p { font-size: 15px !important; }
        .item-container .font-bold { font-size: 16px !important; }

        .status-pendente { color: #f59e0b; font-weight: bold; }
        .status-entregue { color: #10b981; font-weight: bold; }
        .status-cancelado { color: #ef4444; font-weight: bold; }

        .input-padrao {
            width: 100%;
            padding: 8px 12px;
            background-color: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .input-padrao:focus {
             border-color: #2563eb;
         }
         .btn-cadastrar {
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cadastrar:hover {
            background-color: #1d4ed8;
        }

        .btn-trocar {
            background-color: #9333ea !important;
            color: white !important;
            border: none !important;
            border-radius: 8px !important;
            padding: 8px 16px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: background 0.2s !important;
            margin-top: 12px !important;
            width: 100% !important;
        }
        .btn-trocar:hover {
            background-color: #7e22ce !important;
        }

        .filtro-ativo {
            background-color: #2563eb !important;
            color: white !important;
        }
    </style>
</head>
<body class="bg-gray-50">
    <header class="bg-purple-700 text-white py-3 shadow-lg fixed w-full z-50 top-0 left-0">
        <div class="container mx-auto relative">
            <a href="index.html" class="btn-sair">Sair</a>
            <h1 class="font-bold text-center mb-3 titulo-atendente" style="font-size: 22px !important;">💵 Caixa Registradora</h1>

            <nav class="flex justify-center items-center flex-nowrap overflow-hidden">
                <button id="btn-pedidos" class="btn-menu btn-azul" onclick="abrirAba('pedidos')">Pedidos</button>
                <button id="btn-produtos" class="btn-menu btn-azul-claro" onclick="abrirAba('produtos')">Produtos</button>
                <button id="btn-cadastrar-atendente" class="btn-menu btn-azul-claro" onclick="abrirAba('cadastrar-atendente')">Meu Cadastro</button>
            </nav>
        </div>
    </header>

    <section class="container mx-auto p-4 pt-32">
        <div id="aba-pedidos" class="aba-conteudo">
            <div class="bg-white/5 rounded-2xl shadow p-5 mb-6 border border-gray-800">
                <div class="flex flex-wrap gap-2 mb-5 justify-center">
                    <button class="btn-menu btn-azul filtro-btn" onclick="filtrarPedidos('todos')">Todos</button>
                    <button class="btn-menu btn-azul-claro filtro-btn" onclick="filtrarPedidos('Pendente')">Pendentes</button>
                    <button class="btn-menu btn-azul-claro filtro-btn" onclick="filtrarPedidos('Entregue')">Entregues</button>
                    <button class="btn-menu btn-azul-claro filtro-btn" onclick="filtrarPedidos('Cancelado')">Cancelados</button>
                </div>

                <div id="lista-pedidos" class="space-y-4">
                    <p class="text-gray-400 text-center py-6">Nenhum pedido recebido ainda.</p>
                </div>
            </div>
        </div>

        <div id="aba-produtos" class="aba-conteudo hidden">
            <div class="bg-white/5 rounded-2xl shadow p-5 mb-6 border border-gray-800">
                <h2 class="text-lg font-bold text-yellow-500 mb-5 text-center">📦 Cadastrar Novo Produto</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-1">Nome do Produto</label>
                        <input type="text" id="prod-nome" class="input-padrao" placeholder="Ex: Camiseta Azul">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Preço (R$)</label>
                        <input type="number" id="prod-preco" class="input-padrao" step="0.01" min="0" placeholder="0,00">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-1">Descrição / Detalhes</label>
                        <textarea id="prod-descricao" class="input-padrao" rows="3" placeholder="Informações adicionais, cor, tamanho, material..."></textarea>
                    </div>
                </div>

                <button onclick="cadastrarProduto()" class="btn-cadastrar w-full mb-10">💾 Salvar Produto</button>

                <h2 class="text-lg font-bold text-yellow-500 mb-5 text-center">📋 Produtos Cadastrados</h2>
                <div id="lista-produtos-cadastrados" class="space-y-3">
                    <p class="text-gray-400 text-center py-4">Nenhum produto cadastrado.</p>
                </div>
            </div>
        </div>

        <div id="aba-cadastrar-atendente" class="aba-conteudo hidden">
            <div class="bg-white/5 rounded-2xl shadow p-5 mb-6 border border-gray-800">
                <h2 class="text-lg font-bold text-yellow-500 mb-5 text-center">👤 Meu Cadastro de Atendente</h2>
                
                <div class="space-y-4 max-w-md mx-auto mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-1">Seu Nome Completo</label>
                        <input type="text" id="atend-nome" class="input-padrao" placeholder="Digite seu nome">
                    </div>
                </div>

                <button onclick="salvarCadastroAtendente()" class="btn-cadastrar w-full max-w-md mx-auto block">💾 Salvar Meus Dados</button>

                <div id="dados-cadastrados" class="mt-10 p-4 bg-purple-900/30 rounded-xl hidden">
                    <h3 class="font-bold text-center mb-2 text-yellow-400">Atendente Atual</h3>
                    <p class="text-center text-lg font-semibold" id="info-nome"></p>
                    <p class="text-center text-sm text-green-400 mt-1" id="info-entrada"></p>
                    <button onclick="trocarAtendente()" class="btn-trocar">🔄 Trocar Atendente</button>
                </div>

                <div id="historico-trocas" class="mt-8 p-3 bg-black/30 rounded-lg hidden">
                    <h4 class="text-sm font-bold text-yellow-400 mb-2 text-center">📜 Histórico de Troca de Turno</h4>
                    <div id="lista-historico" class="text-xs space-y-1 max-h-40 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="modalEditar" class="modal fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/80"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-gray-900 rounded-2xl p-6 shadow-2xl border border-gray-700">
            <h3 class="text-xl font-bold text-yellow-500 mb-4 text-center">✏️ Editar Pedido</h3>
            
            <input type="hidden" id="edit-pedido-id">
            
            <div class="space-y-3 mb-4">
                 <div>
                     <label class="text-sm block mb-1">Status do Pedido</label>
                     <select id="edit-status" class="input-padrao">
                         <option value="Pendente">Pendente</option>
                         <option value="Entregue">Entregue</option>
                         <option value="Cancelado">Cancelado</option>
                     </select>
                 </div>
                 <div>
                     <label class="text-sm block mb-1">Forma de Pagamento</label>
                     <select id="edit-forma-pagamento" class="input-padrao">
                         <option value="Dinheiro">Dinheiro</option>
                         <option value="Cartão de Crédito">Cartão de Crédito</option>
                         <option value="Cartão de Débito">Cartão de Débito</option>
                         <option value="Pix">Pix</option>
                         <option value="Transferência Bancária">Transferência Bancária</option>
                     </select>
                 </div>
                 <div>
                     <label class="text-sm block mb-1">Observações</label>
                     <textarea id="edit-observacao" class="input-padrao" rows="3" placeholder="Alterar observações do pedido..."></textarea>
                 </div>
             </div>

             <div class="flex gap-2 justify-end mt-4">
                 <button onclick="fecharModalEditar()" class="btn-cancelar px-4 py-2 rounded-lg">Cancelar</button>
                 <button onclick="salvarEdicaoPedido()" class="btn-entregue px-4 py-2 rounded-lg">Salvar Alterações</button>
             </div>
         </div>
     </div>

     <script>
         const firebaseConfig = {
             apiKey: "AIzaSyCYd655rBu8_UfwGtYWDgRzdtAw-UAR9Qg",
             authDomain: "val-modas.firebaseapp.com",
             databaseURL: "https://val-modas-default-rtdb.firebaseio.com",
             projectId: "val-modas",
             storageBucket: "val-modas.firebasestorage.app",
             messagingSenderId: "1060099036181",
             appId: "1:1060099036181:web:e677b3b6ae0ce1a499aa1c"
         };

         if (!firebase.apps.length) {
             firebase.initializeApp(firebaseConfig);
         }
         const db = firebase.database();

         function enviarParaAdmin(caminho, dados, tipo = 'geral') {
             db.ref(`admin_dados/${caminho}`).set(dados);
             db.ref(`admin_logs/${Date.now()}`).set({
                 tipo: tipo,
                 dados: dados,
                 data_hora: new Date().toLocaleString('pt-BR'),
                 origem: 'caixa_registradora'
             });
             return db.ref(caminho).set(dados);
         }

         function salvarDados(caminho, dados) {
             return enviarParaAdmin(caminho, dados, 'alteracao_dados');
         }

         function carregarDados(caminho) {
             return db.ref(caminho).once('value').then(snap => {
                 const valor = snap.val();
                 if (!valor) return [];
                 return Array.isArray(valor) ? valor.filter(Boolean) : Object.values(valor);
             });
         }

         let nomeAtendenteGlobal = "Não identificado";

         async function getNomeAtendenteAtual() {
             const atendente = await db.ref('atendente_cadastro').once('value');
             const dados = atendente.val();
             if (dados && dados.nome) {
                 nomeAtendenteGlobal = dados.nome;
                 localStorage.setItem('atendente_nome_atual', dados.nome);
                 enviarParaAdmin('atendente_atual_operando', dados, 'status_atendente');
                 return dados.nome;
             }
             nomeAtendenteGlobal = "Não identificado";
             localStorage.removeItem('atendente_nome_atual');
             enviarParaAdmin('atendente_atual_operando', {nome: 'Nenhum', status: 'inativo'}, 'status_atendente');
             return 'Não identificado';
         }

         function formatarMoeda(v) {
             return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
         }

         function abrirAba(nome) {
             document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.add('hidden'));
             document.getElementById(`aba-${nome}`).classList.remove('hidden');

             document.querySelectorAll('.btn-menu').forEach(btn => {
                 btn.classList.remove('btn-azul');
                 btn.classList.add('btn-azul-claro');
             });
             document.getElementById(`btn-${nome}`).classList.remove('btn-azul-claro');
             document.getElementById(`btn-${nome}`).classList.add('btn-azul');

             if(nome === 'pedidos') carregarPedidos();
         }

         let filtroAtual = 'todos';

         document.addEventListener('DOMContentLoaded', async () => {
             await getNomeAtendenteAtual();
             carregarPedidos();
             carregarProdutosCadastrados();
             verificarCadastroAtendente();
             carregarHistoricoTrocas();

             db.ref('pedidos').on('value', () => {
                 if(!document.getElementById('aba-pedidos').classList.contains('hidden')) {
                     carregarPedidos();
                 }
                 window.dispatchEvent(new Event('pedidosAtualizados'));
                 carregarDados('pedidos').then(lista => enviarParaAdmin('todos_pedidos_lista', lista, 'atualizacao_pedidos'));
             });

             db.ref('produtos').on('value', () => {
                 carregarProdutosCadastrados();
                 window.dispatchEvent(new Event('produtosAtualizados'));
                 carregarDados('produtos').then(lista => enviarParaAdmin('todos_produtos_lista', lista, 'atualizacao_produtos'));
             });

             db.ref('atendente_cadastro').on('value', async () => {
                 await getNomeAtendenteAtual();
                 window.dispatchEvent(new Event('atendenteAlterado'));
             });

             db.ref('historico_trocas').on('value', () => {
                 carregarDados('historico_trocas').then(lista => enviarParaAdmin('historico_completo_trocas', lista, 'historico'));
             });

             window.addEventListener('storage', (e) => {
                 if (e.key === 'ultimoPedido') carregarPedidos();
                 if (e.key === 'carrinho') carregarPedidos();
             });
         });

         async function carregarPedidos() {
             const pedidos = await carregarDados('pedidos');
             const container = document.getElementById('lista-pedidos');

             if (pedidos.length === 0) {
                 container.innerHTML = '<p class="text-gray-400 text-center py-6">Nenhum pedido recebido ainda.</p>';
                 enviarParaAdmin('resumo_pedidos', {quantidade: 0, mensagem: 'Nenhum pedido'}, 'resumo');
                 return;
             }

             let pedidosFiltrados = pedidos;
             if (filtroAtual !== 'todos') {
                 pedidosFiltrados = pedidos.filter(p => p.status === filtroAtual);
             }

             if (pedidosFiltrados.length === 0) {
                 container.innerHTML = `<p class="text-gray-400 text-center py-6">Nenhum pedido com status "${filtroAtual}".</p>`;
                 return;
             }

             pedidosFiltrados.sort((a, b) => parseInt(b.id) - parseInt(a.id));

             container.innerHTML = '';
             pedidosFiltrados.forEach(p => {
                 const classeStatus = p.status === 'Entregue' ? 'status-entregue' : p.status === 'Cancelado' ? 'status-cancelado' : 'status-pendente';

                 let listaItens = '';
                 if (p.itens && Array.isArray(p.itens)) {
                     p.itens.forEach(item => {
                         listaItens += `<p class="text-sm text-gray-300">• ${item.nome} <span class="text-gray-500">x${item.quantidade}</span> - ${formatarMoeda(item.preco * item.quantidade)}<br><span class="text-xs text-gray-400">${item.descricao || ''}</span></p>`;
                     });
                 }

                 container.innerHTML += `
                 <div class="item-container">
                     <div class="w-full">
                         <div class="flex flex-wrap justify-between items-start mb-2 gap-2">
                             <h4 class="font-bold text-lg text-yellow-400">Pedido</h4>
                             <span class="${classeStatus}">${p.status || 'Pendente'}</span>
                         </div>

                         <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
                             <div>
                                 <p class="text-sm"><strong>Cliente:</strong> ${p.cliente_nome || 'Não informado'}</p>
                                 <p class="text-sm"><strong>Contato:</strong> ${p.cliente_whatsapp || 'Não informado'}</p>
                                 <p class="text-sm"><strong>Endereço:</strong> ${p.cliente_endereco || 'Não informado'}</p>
                                 <p class="text-sm text-xs text-gray-400"><strong>Ref:</strong> ${p.cliente_referencia || 'Sem referência'}</p>
                             </div>
                             <div>
                                 <p class="text-sm"><strong>Pagamento:</strong> ${p.forma_pagamento || 'A definir'}</p>
                                 <p class="text-sm"><strong>Observação:</strong> ${p.observacao || 'Nenhuma'}</p>
                                 <p class="text-sm text-yellow-500 font-bold text-lg mt-1">Total: ${formatarMoeda(p.total || 0)}</p>
                                 <p class="text-xs text-gray-500">Atendente: ${p.atendente_nome || nomeAtendenteGlobal}</p>
                             </div>
                         </div>

                         <div class="mb-3 p-2 bg-black/30 rounded-lg">
                             <p class="text-sm font-medium mb-1">Itens do Pedido:</p>
                             ${listaItens || '<p class="text-sm text-gray-400">Nenhum item encontrado</p>'}
                         </div>

                         <div class="flex flex-wrap gap-2 justify-end border-t border-gray-700 pt-3">
                             <button class="btn-acao btn-entregue" onclick="alterarStatusPedido('${p.id}', 'Entregue')">✅ Entregue</button>
                             <button class="btn-acao btn-cancelar" onclick="alterarStatusPedido('${p.id}', 'Cancelado')">❌ Cancelar</button>
                             <button class="btn-acao btn-editar" onclick="abrirModalEditarPedido('${p.id}')">✏️ Editar</button>
                             <button class="btn-remover" onclick="removerItem('pedidos', '${p.id}', this)">🗑️</button>
                         </div>
                     </div>
                 </div>
                 `;
             });

             const totalGeral = pedidos.reduce((soma, p) => soma + (p.total || 0), 0);
             enviarParaAdmin('resumo_pedidos', {
                 quantidade_total: pedidos.length,
                 pendentes: pedidos.filter(p => p.status === 'Pendente').length,
                 entregues: pedidos.filter(p => p.status === 'Entregue').length,
                 cancelados: pedidos.filter(p => p.status === 'Cancelado').length,
                 valor_total: totalGeral
             }, 'resumo');
         }

         function filtrarPedidos(status) {
             filtroAtual = status;
             document.querySelectorAll('.filtro-btn').forEach(btn => {
                 btn.classList.remove('filtro-ativo', 'btn-azul');
                 btn.classList.add('btn-azul-claro');
             });
             event.target.classList.remove('btn-azul-claro');
             event.target.classList.add('filtro-ativo', 'btn-azul');
             carregarPedidos();
         }

         async function alterarStatusPedido(idPedido, novoStatus) {
             if (!idPedido) { alert("Erro: ID do pedido não encontrado!"); return; }
             const nomeAtendente = await getNomeAtendenteAtual();
             const pedidos = await carregarDados('pedidos');
             const pedidosAtualizados = pedidos.map(p => {
                 if (p.id === idPedido) {
                     return { ...p, status: novoStatus, atendente_nome: nomeAtendente, alterado_por: nomeAtendente, data_alteracao: new Date().toLocaleString('pt-BR') };
                 }
                 return p;
             });
             await salvarDados('pedidos', pedidosAtualizados);
             alert(`✅ Pedido marcado como ${novoStatus} com sucesso!`);
             enviarParaAdmin(`alteracao_status_${idPedido}`, {id: idPedido, novo_status: novoStatus, atendente: nomeAtendente}, 'alteracao_status');
         }

         let pedidoEmEdicao = null;
         async function abrirModalEditarPedido(idPedido) {
             const pedidos = await carregarDados('pedidos');
             const pedido = pedidos.find(p => p.id === idPedido);
             if (!pedido) { alert("Pedido não encontrado!"); return; }

             pedidoEmEdicao = pedido;
             document.getElementById('edit-pedido-id').value = pedido.id;
             document.getElementById('edit-status').value = pedido.status || 'Pendente';
             document.getElementById('edit-forma-pagamento').value = pedido.forma_pagamento || 'Dinheiro';
             document.getElementById('edit-observacao').value = pedido.observacao || '';

             document.getElementById('modalEditar').classList.remove('hidden');
         }

         function fecharModalEditar() {
             document.getElementById('modalEditar').classList.add('hidden');
             pedidoEmEdicao = null;
         }

         async function salvarEdicaoPedido() {
             if (!pedidoEmEdicao) return;

             const novoStatus = document.getElementById('edit-status').value;
             const novaForma = document.getElementById('edit-forma-pagamento').value;
             const novaObs = document.getElementById('edit-observacao').value;
             const nomeAtendente = await getNomeAtendenteAtual();

             const pedidos = await carregarDados('pedidos');
             const pedidosAtualizados = pedidos.map(p => {
                 if (p.id === pedidoEmEdicao.id) {
                     return {
                         ...p,
                         status: novoStatus,
                         forma_pagamento: novaForma,
                         observacao: novaObs,
                         atendente_nome: nomeAtendente,
                         ultima_alteracao: new Date().toLocaleString('pt-BR')
                     };
                 }
                 return p;
             });

             await salvarDados('pedidos', pedidosAtualizados);
             fecharModalEditar();
             alert('✅ Pedido atualizado com sucesso!');
             enviarParaAdmin(`edicao_pedido_${pedidoEmEdicao.id}`, {id: pedidoEmEdicao.id, alterado_por: nomeAtendente}, 'edicao');
         }

         async function cadastrarProduto() {
             const nome = document.getElementById('prod-nome').value.trim();
             const preco = parseFloat(document.getElementById('prod-preco').value);
             const descricao = document.getElementById('prod-descricao').value.trim();

             if (!nome || isNaN(preco) || preco <= 0) {
                 alert('❌ Preencha nome e preço válido!');
                 return;
             }

             const nomeAtendente = await getNomeAtendenteAtual();

             const produtos = await carregarDados('produtos');
             const novoProduto = {
                 id: Date.now().toString(),
                 nome: nome,
                 preco: preco,
                 descricao: descricao,
                 disponivel: true,
                 cadastrado_por: nomeAtendente,
                 data_cadastro: new Date().toLocaleString('pt-BR')
             };
             produtos.push(novoProduto);

             await salvarDados('produtos', produtos);
             alert('✅ Produto cadastrado e já disponível para os clientes!');

             enviarParaAdmin('novo_produto_cadastrado', novoProduto, 'cadastro_produto');

             window.dispatchEvent(new Event('produtosAtualizados'));

             document.getElementById('prod-nome').value = '';
             document.getElementById('prod-preco').value = '';
             document.getElementById('prod-descricao').value = '';
         }

         async function carregarProdutosCadastrados() {
             const produtos = await carregarDados('produtos');
             const container = document.getElementById('lista-produtos-cadastrados');

             if (produtos.length === 0) {
                 container.innerHTML = '<p class="text-gray-400 text-center py-4">Nenhum produto cadastrado.</p>';
                 return;
             }

             container.innerHTML = '';
             produtos.forEach(prod => {
                 container.innerHTML += `
                 <div class="p-3 bg-white/5 rounded-lg shadow-sm item-container">
                     <div>
                         <p class="font-bold">${prod.nome}</p>
                         <p class="text-green-500 font-medium">${formatarMoeda(prod.preco)}</p>
                         <p class="text-xs text-gray-400">${prod.descricao || 'Sem descrição'}</p>
                         <p class="text-xs text-gray-500">Cadastrado por: ${prod.cadastrado_por}</p>
                     </div>
                     <button class="btn-remover" onclick="removerItem('produtos', '${prod.id}', this)">🗑️</button>
                 </div>
                 `;
             });
         }

         async function salvarCadastroAtendente() {
             const nome = document.getElementById('atend-nome').value.trim();

             if (!nome) {
                 alert('❌ Informe seu nome completo!');
                 return;
             }

             const agora = new Date().toLocaleString('pt-BR');

             const dadosAtendente = {
                 id: 'atendente_atual',
                 nome: nome,
                 hora_entrada: agora,
                 status: 'ativo'
             };

             try {
                 await enviarParaAdmin('atendente_cadastro', dadosAtendente, 'cadastro_atendente');
                 await getNomeAtendenteAtual();
                 alert('✅ Cadastro realizado! Turno iniciado às ' + agora);
                 verificarCadastroAtendente();
                 window.dispatchEvent(new Event('storage'));
             } catch (erro) {
                 alert('❌ Erro ao cadastrar: ' + erro.message);
             }
         }

         async function verificarCadastroAtendente() {
             const atendente = await db.ref('atendente_cadastro').once('value');
             const dados = atendente.val();
             const containerInfo = document.getElementById('dados-cadastrados');
             const containerHistorico = document.getElementById('historico-trocas');

             if (dados && dados.nome) {
                 document.getElementById('info-nome').innerText = dados.nome;
                 document.getElementById('info-entrada').innerText = 'Entrou às: ' + dados.hora_entrada;
                 containerInfo.classList.remove('hidden');
                 containerHistorico.classList.remove('hidden');
                 document.getElementById('atend-nome').value = dados.nome;
                 enviarParaAdmin('status_atendente_atual', {nome: dados.nome, entrada: dados.hora_entrada, status: 'trabalhando'}, 'status');
             } else {
                 containerInfo.classList.add('hidden');
                 containerHistorico.classList.add('hidden');
                 enviarParaAdmin('status_atendente_atual', {status: 'sem_atendente'}, 'status');
             }
         }

         async function trocarAtendente() {
             const atendenteAtual = await db.ref('atendente_cadastro').once('value');
             const dadosAtual = atendenteAtual.val();
             
             if (!dadosAtual || !dadosAtual.nome) {
                 alert('❌ Nenhum atendente cadastrado ainda!');
                 return;
             }

             const horaSaida = new Date().toLocaleString('pt-BR');

             const registroSaida = {
                 id: Date.now().toString(),
                 nome: dadosAtual.nome,
                 entrada: dadosAtual.hora_entrada,
                 saida: horaSaida,
                 duracao: 'Turno finalizado'
             };

             const historico = await carregarDados('historico_trocas');
             historico.push(registroSaida);
             await salvarDados('historico_trocas', historico);

             await db.ref('atendente_cadastro').remove();
             nomeAtendenteGlobal = "Não identificado";

             enviarParaAdmin('troca_atendente_registrada', registroSaida, 'troca_turno');

             alert('✅ Troca registrada! Saída às: ' + horaSaida + '\nAgora é só cadastrar o próximo atendente.');

             verificarCadastroAtendente();
             carregarHistoricoTrocas();
             window.dispatchEvent(new Event('storage'));
         }

         async function carregarHistoricoTrocas() {
             const historico = await carregarDados('historico_trocas');
             const lista = document.getElementById('lista-historico');

             if (historico.length === 0) {
                 lista.innerHTML = '<p class="text-gray-400 text-center">Nenhuma troca registrada</p>';
                 return;
             }

             lista.innerHTML = '';
             historico.reverse().forEach(reg => {
                 lista.innerHTML += `
                     <p class="text-gray-200">👤 ${reg.nome}<br>
                     ⏰ Entrada: ${reg.entrada}<br>
                     ⏰ Saída: ${reg.saida}</p>
                     <hr class="border-gray-700 my-1">
                 `;
             });

             enviarParaAdmin('todo_historico_trocas', historico, 'historico_completo');
         }

         function removerItem(caminho, idItem, botaoClicado) {
             if (!confirm('⚠️ ATENÇÃO! Essa ação irá APAGAR DEFINITIVAMENTE este item do sistema. Não poderá ser recuperado. Deseja continuar?')) {
                 return;
             }

             const itemParaRemover = botaoClicado.closest('.item-container');
             itemParaRemover.style.opacity = '0';
             itemParaRemover.style.transform = 'translateX(-20px)';

             setTimeout(async () => {
                 const dados = await carregarDados(caminho);
                 const dadosAtualizados = dados.filter(item => String(item.id) === String(idItem) ? false : true);
                 await salvarDados(caminho, dadosAtualizados);

                 enviarParaAdmin(`exclusao_${caminho}_${idItem}`, {id: idItem, tipo: caminho}, 'exclusao');

                 if (caminho === 'produtos') window.dispatchEvent(new Event('produtosAtualizados'));
                 if (caminho === 'pedidos') window.dispatchEvent(new Event('pedidosAtualizados'));

             }, 300);
         }
    </script>

</body>
</html>
